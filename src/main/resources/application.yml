spring:
  application:
    name: url-shortener

  datasource:
    # Railway injects PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:urlshortener}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      # Railway injects REDIS_URL as redis://:password@host:port
      url: ${REDIS_URL:redis://localhost:6379}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: url-shortener

app:
  # Set APP_BASE_URL to your Railway domain, e.g. https://your-app.up.railway.app
  base-url: ${APP_BASE_URL:http://localhost:8080}
  rate-limit:
    requests: 10
    window-seconds: 60
  jwt:
    secret: ${JWT_SECRET:change-me-use-a-long-random-secret-in-production}
    expiry-hours: 720  # 30 days

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
