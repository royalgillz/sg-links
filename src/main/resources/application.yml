spring:
  application:
    name: sg-links

  main:
    lazy-initialization: true

  datasource:
    # host/db/user/password come from the Postgres provider (Neon, local docker, etc).
    # PGSSLMODE is "disable" locally and "require" for managed providers like Neon.
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:sglinks}?sslmode=${PGSSLMODE:disable}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      # local docker uses redis://; managed TLS providers like Upstash use rediss://
      url: ${REDIS_URL:redis://localhost:6379}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: sg-links

app:
  # Set APP_BASE_URL to your Railway domain, e.g. https://your-app.up.railway.app
  base-url: ${APP_BASE_URL:http://localhost:8080}
  rate-limit:
    requests: 10
    window-seconds: 60
  jwt:
    secret: ${JWT_SECRET:change-me-use-a-long-random-secret-in-production}
    expiry-hours: 720  # 30 days

openai:
  api-key: ${OPENAI_API_KEY:}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
